version: "2"

run:
  go: "1.26"
  timeout: 10m
  allow-parallel-runners: true
  modules-download-mode: readonly
  tests: false
  relative-path-mode: gomod

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
    code-climate:
      path: reports/golangci-lint.json
  sort-order:
    - severity
    - file
    - linter

issues:
  max-issues-per-linter: 100
  max-same-issues: 10
  uniq-by-line: true

# ═══════════════════════════════════════════════════════════════════════════════
# LINTERS
# ═══════════════════════════════════════════════════════════════════════════════
linters:
  default: none
  enable:
    # ──────────────────────────────────────────────────────────────────────────
    # CORE (Zero False Positives)
    # ──────────────────────────────────────────────────────────────────────────
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

    # ──────────────────────────────────────────────────────────────────────────
    # ERROR HANDLING (FAANG Critical)
    # ──────────────────────────────────────────────────────────────────────────
    - errorlint
    - wrapcheck
    - nilnil

    # ──────────────────────────────────────────────────────────────────────────
    # COMPLEXITY & MAINTAINABILITY
    # ──────────────────────────────────────────────────────────────────────────
    - gocyclo
    - cyclop
    - funlen
    - dupl

    # ──────────────────────────────────────────────────────────────────────────
    # CODE QUALITY
    # ──────────────────────────────────────────────────────────────────────────
    - revive
    - gocritic
    - unconvert
    - unparam
    - nakedret
    - nonamedreturns
    - predeclared
    - reassign

    # ──────────────────────────────────────────────────────────────────────────
    # CORRECTNESS & SAFETY
    # ──────────────────────────────────────────────────────────────────────────
    - contextcheck
    - noctx
    - durationcheck
    - copyloopvar
    - intrange

    # ──────────────────────────────────────────────────────────────────────────
    # PERFORMANCE (Production Critical)
    # ──────────────────────────────────────────────────────────────────────────
    - prealloc
    - perfsprint
    - usestdlibvars
    - bodyclose
    - inamedparam
    - spancheck

    # ──────────────────────────────────────────────────────────────────────────
    # SECURITY (FAANG Mandatory)
    # ──────────────────────────────────────────────────────────────────────────
    - gosec

    # ──────────────────────────────────────────────────────────────────────────
    # STYLE & DOCUMENTATION
    # ──────────────────────────────────────────────────────────────────────────
    - misspell
    - whitespace
    - godot
    - godox
    - nosprintfhostport
    - interfacebloat
    - loggercheck

    # ──────────────────────────────────────────────────────────────────────────
    # STRUCT & TYPE QUALITY
    # ──────────────────────────────────────────────────────────────────────────
    - tagliatelle
    - musttag
    - recvcheck

    # ──────────────────────────────────────────────────────────────────────────
    # LOGGING & OBSERVABILITY
    # ──────────────────────────────────────────────────────────────────────────
    - sloglint

    # ──────────────────────────────────────────────────────────────────────────
    # TESTING & DEFERS
    # ──────────────────────────────────────────────────────────────────────────
    - testableexamples
    - testpackage
    - paralleltest

  settings:
    # ──────────────────────────────────────────────────────────────────────────
    # govet
    # ──────────────────────────────────────────────────────────────────────────
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    # ──────────────────────────────────────────────────────────────────────────
    # staticcheck
    # ──────────────────────────────────────────────────────────────────────────
    staticcheck:
      checks:
        - all
        - -SA1019
        - -SA4006
        - -ST1000
        - -ST1003
        - -ST1005
        - -ST1016
        - -QF1001
        - -QF1003

    # ──────────────────────────────────────────────────────────────────────────
    # Complexity Thresholds (FAANG Standard)
    # ──────────────────────────────────────────────────────────────────────────
    gocyclo:
      min-complexity: 15

    cyclop:
      max-complexity: 15
      package-average: 10

    funlen:
      lines: 75
      statements: 40

    dupl:
      threshold: 50

    # ──────────────────────────────────────────────────────────────────────────
    # Performance
    # ──────────────────────────────────────────────────────────────────────────
    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

    # ──────────────────────────────────────────────────────────────────────────
    # Security (Strict FAANG Policy)
    # ──────────────────────────────────────────────────────────────────────────
    gosec:
      excludes:
        - G104
        - G107
        - G204
        - G304
        - G307
        - G404
        - G401
        - G402
        - G403
        - G501
        - G505
        - G601
        - G115
      config:
        global:
          audit: true
        runs:
          skip-generated: true

    # ──────────────────────────────────────────────────────────────────────────
    # Style & Documentation
    # ──────────────────────────────────────────────────────────────────────────
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - behaviour
        - colour
        - flavour
        - honour
        - labour
        - neighbour
        - favour
        - manoeuvre
        - programme
        - realise

    godot:
      scope: declarations
      exclude:
        - "^//nolint:"
        - "^//go:generate"
        - "^//go:build"
        - "^// +build"
        - "^// Code generated"
        - "^// DO NOT EDIT"
      capital: true
      period: true

    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - XXX
        - BUG
        - OPTIMIZE
        - TECHDEBT

    nakedret:
      max-func-lines: 5

    # ──────────────────────────────────────────────────────────────────────────
    # Struct Tags
    # ──────────────────────────────────────────────────────────────────────────
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          toml: snake
          xml: camel
          bson: camel
          avro: snake
          mapstructure: kebab
          env: upperSnake
          header: snake
          query: snake
          param: snake
          form: snake
          url: snake
          msgpack: camel
          protobuf: camel

    # ──────────────────────────────────────────────────────────────────────────
    # Revive
    # ──────────────────────────────────────────────────────────────────────────
    revive:
      severity: warning
      confidence: 0.8
      rules:
        # Imports
        - name: blank-imports
        - name: dot-imports
        - name: duplicated-imports
        - name: import-alias-naming
          arguments:
            - "^[a-z][a-z0-9]+$"

        # Context
        - name: context-as-argument
        - name: context-keys-type

        # Errors
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: errorf
        - name: indent-error-flow

        # Exports
        - name: exported
          arguments:
            - disableStutteringCheck
            - checkPrivateReceivers
        - name: unexported-return

        # Naming
        - name: var-naming
          arguments:
            - []
            - []
        - name: var-declaration
        - name: receiver-naming
        - name: time-naming

        # Control Flow
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: superfluous-else
        - name: unreachable-code
        - name: early-return
        - name: defer
        - name: bool-literal-in-expr
        - name: redundant-import-alias
        - name: identical-branches

        # Functions
        - name: get-return
        - name: unused-parameter
          arguments:
            - allowRegex: "^_"
        - name: unused-receiver

        # Types
        - name: redefines-builtin-id
        - name: atomic

        # Concurrency
        - name: waitgroup-by-value

        # Modifiers
        - name: modifies-value-receiver

        # Other
        - name: package-comments
        - name: empty-block
        - name: deep-exit
        - name: confusing-results
        - name: constant-logical-expr
        - name: optimize-operands-order
        - name: use-errors-new
        - name: struct-tag

    # ──────────────────────────────────────────────────────────────────────────
    # gocritic
    # ──────────────────────────────────────────────────────────────────────────
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
        - experimental
        - opinionated
      disabled-checks:
        - rangeValCopy
        - paramTypeCombine
        - unnamedResult
        - singleCaseSwitch
        - tooManyResultsChecker
      settings:
        rangeExprCopy:
          sizeThreshold: 512
        underef:
          skipRecvDeref: true
        ruleguard:
          failOn: all
          rules: ""

    # ──────────────────────────────────────────────────────────────────────────
    # Testing
    # ──────────────────────────────────────────────────────────────────────────
    testpackage:
      skip-regexp: "^(example|internal/testutil|internal/testhelpers)"
      allow-packages:
        - ".*_test$"

    paralleltest:
      ignore-missing: true
      ignore-missing-subtests: true

    # ──────────────────────────────────────────────────────────────────────────
    # Interface Analysis
    # ──────────────────────────────────────────────────────────────────────────
    interfacebloat:
      max: 10

    # ──────────────────────────────────────────────────────────────────────────
    # Reassign Analysis
    # ──────────────────────────────────────────────────────────────────────────
    reassign:
      patterns:
        - "(?i)^err$"

  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ".*_test\\.go$"
      - "^vendor/"
      - "^third_party/"
      - "^\\.git/"
      - "^\\.github/"
      - "^docs/"
      - "^README\\.md$"
      - "^examples/"
      - "^example/"
      - "example/"
      - "examples/"
      - "^testdata/"
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - ".*\\.gen\\.go$"
      - ".*\\.generated\\.go$"
      - ".*_mock\\.go$"
      - ".*_stub\\.go$"
      - ".*_fixture\\.go$"
      - "zz_.*\\.go$"
      - ".*\\.deepcopy\\.go$"
      - ".*\\.wire\\.go$"
      - ".*\\.di\\.go$"
      - "^fuzz/"
      - ".*_fuzz\\.go$"
      - ".*\\.sh$"
      - "Makefile"
      - "Dockerfile"

    rules:
      # ── Package Documentation (Relaxed) ──
      - linters:
          - revive
          - staticcheck
        text: "should have a package comment"

      - linters:
          - revive
          - staticcheck
        text: "comment on exported"

      # ── Style Flexibilities ──
      - linters:
          - revive
        text: "error strings should not be capitalized"

      - linters:
          - revive
        text: "don't use underscores in Go names"

      - linters:
          - revive
        text: "avoid meaningless package names"

      - linters:
          - revive
        text: "stutters"

      # ── Staticcheck Specific ──
      - linters:
          - staticcheck
        text: "ST1000:"

      - linters:
          - staticcheck
        text: "ST1005:"

      - linters:
          - staticcheck
        text: "SA1019:"

      - linters:
          - staticcheck
        text: "SA4006:"

      # ── Error Handling Flexibilities ──
      - linters:
          - wrapcheck
        text: "error returned from interface method"

      - linters:
          - wrapcheck
        text: "error returned from unexported function"

      - linters:
          - wrapcheck
        text: "error returned without wrapping"

      # ── Test File Relaxations ──
      - path: ".*_test\\.go$"
        linters:
          - gocyclo
          - cyclop
          - funlen
          - errcheck
          - dupl
          - gosec
          - gocritic
          - godot
          - wrapcheck
          - nakedret
          - paralleltest
          - testpackage
          - nonamedreturns
          - interfacebloat

      # ── Security Path Exceptions ──
      - path: "(^|/)crypto(/|$)"
        text: "G404"
        linters:
          - gosec

      - path: "(^|/)internal/crypto(/|$)"
        text: "G401"
        linters:
          - gosec

      - path: "(^|/)cmd(/|$)"
        text: "G107"
        linters:
          - gosec

      - path: "(^|/)internal/testutil(/|$)"
        linters:
          - gosec
          - wrapcheck
          - godot

      - path: "(^|/)internal/testhelpers(/|$)"
        linters:
          - gosec
          - wrapcheck
          - godot

      # ── Main Package Exceptions ──
      - path: "cmd/.*main\\.go$"
        linters:
          - gosec
          - wrapcheck
          - errcheck

      # ── Init Functions ──
      - linters:
          - gosec
          - wrapcheck
          - errcheck
        source: "^func init\\(\\)"

      # ── Generated Code ──
      - path: ".*\\.pb\\.go$"
        linters:
          - all

      - path: ".*\\.gen\\.go$"
        linters:
          - all

      - path: ".*_mock\\.go$"
        linters:
          - all

# ═══════════════════════════════════════════════════════════════════════════════
# FORMATTERS
# ═══════════════════════════════════════════════════════════════════════════════
formatters:
  enable:
    - gci
    - gofumpt

  settings:
    gci:
      sections:
        - standard
        - default
        - blank
        - dot
        - alias
        - localmodule
      custom-order: true
      no-inline-comments: true

    gofumpt:
      extra-rules: true
      module-path: github.com/os-gomod

  exclusions:
    paths:
      - "^vendor/"
      - "^example/"
      - "^examples/"
      - "^third_party/"
      - "^\\.git/"
      - "^\\.github/"
      - ".*\\.gen\\.go$"
      - ".*\\.generated\\.go$"
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - ".*_mock\\.go$"
      - ".*_stub\\.go$"
      - ".*\\.deepcopy\\.go$"
      - ".*\\.wire\\.go$"
      - ".*\\.di\\.go$"
      - "zz_.*\\.go$"
      - "^fuzz/"
